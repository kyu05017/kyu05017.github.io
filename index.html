<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 · Team Movo</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg: #0f1115;
        --card: #171a20;
        --line: rgba(255,255,255,0.08);
        --text: #f4f1ea;
        --muted: rgba(244,241,234,0.62);
        --accent: #f0b24a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(240,178,74,0.10), transparent 30%),
          linear-gradient(180deg, #0d1014 0%, #0f1115 100%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      }
      .card {
        width: min(100%, 560px);
        padding: 32px;
        border-radius: 24px;
        background: var(--card);
        border: 1px solid var(--line);
        box-shadow: 0 20px 60px rgba(0,0,0,.35);
        text-align: center;
      }
      .badge {
        display: inline-block;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(240,178,74,0.12);
        color: #ffd892;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: .08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 18px 0 10px;
        font-size: clamp(42px, 8vw, 72px);
        line-height: .95;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }
      .actions {
        margin-top: 24px;
        display: flex;
        justify-content: center;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 999px;
        background: var(--accent);
        color: #2b1b00;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">Not Found</span>
      <h1>404</h1>
      <p>
        이 페이지는 현재 비워두었습니다.<br />
        세줄요약 개인정보처리방침은 아래 링크에서 확인할 수 있습니다.
      </p>
      <div class="actions">
        <a href="/three-line-summary/privacy-policy/">개인정보처리방침 보기</a>
      </div>
    </main>
  </body>
</html>
